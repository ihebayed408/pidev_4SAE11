spring.application.name=notification
server.port=8087
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true

welcome.message=Welcome to notification microservice (local config)

# Firebase: path to service account JSON. Uses GOOGLE_APPLICATION_CREDENTIALS if set,
# otherwise path relative to project root (when run from Notification module: ../../../ = root).
notification.firebase.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:${user.dir}/../../../notificationsystem-3bd2f-firebase-adminsdk-fbsvc-a00d605692.json}

# Swagger / OpenAPI
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration,org.springdoc.core.configuration.SpringDocHateoasConfiguration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Config Server client
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

management.endpoints.web.exposure.include=refresh,health
